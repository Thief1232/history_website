<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>История не найдена</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-zinc-950 text-zinc-100 antialiased">
    <main class="mx-auto grid min-h-screen w-full max-w-3xl content-center gap-6 px-4 py-8">
        <img
            class="w-full rounded-2xl border border-zinc-800 bg-zinc-900"
            src="{{ url_for('static', path='404.svg') }}"
            alt="404"
        >
        <section class="grid gap-3 rounded-2xl border border-zinc-800 bg-zinc-900 p-5" aria-label="История браузера не найдена">
            <h1 class="text-2xl font-black">Не удалось найти {{ browser_label }}</h1>
            <p class="text-zinc-400">{{ message }}</p>
            <a class="font-bold text-sky-300 hover:text-sky-200" href="/">Вернуться на главную</a>
        </section>
    </main>
</body>
</html>
